# =============================================
# TMUX CONFIGURATION 
# 
# Changelog:
# 2026-03-03
# Konfigurasi tmux untuk IGN26 dan IGN2026
# =============================================

# 1. GENERAL SETTINGS
# ---------------------------------------------
# Support 256 colors & RGB
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Aktifkan Mouse (untuk scroll log dan resize panel)
set -g mouse on

# Tambah limit history (default cuma 2000 baris)
set -g history-limit 50000

# Mulai index window (jendela) dari 1
set -g base-index 1

# Mulai index pane (panel) dari 1
setw -g pane-base-index 1

# Pastikan index diatur ulang secara otomatis jika ada jendela yang ditutup
set -g renumber-windows on

# Jangan ada delay saat tekan ESC (penting untuk pengguna Neovim/Vim)
set -s escape-time 0


# 2. KEY BINDINGS (SHORTCUTS)
# ---------------------------------------------
# Ganti Prefix dari C-b ke C-a
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Kirim Ctrl-a ke aplikasi (Nano/Bash) sebagai fungsi "HOME"
# Cara pakai: Tekan Prefix (C-a) lalu tekan 'a' sekali lagi
bind a send-prefix

# Split Panel Intuitif (Path tetap di folder saat ini)
# v = Vertical (samping), h = Horizontal (bawah)
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Navigasi Panel ala Vim (Alt + h/j/k/l) tanpa perlu tekan Prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Navigasi Panel juga bisa memakai Alt + panah kiri kanan atas bawah
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -R

# Reload Konfigurasi dengan Prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# 3. STATUS BAR & CLOCK (FORMAT 2026-03-24 17:12:55)
# ---------------------------------------------
# Update status bar setiap 3 detik agar detik berjalan lancar
set -g status-interval 3

# Warna Status Bar (Gelap Elegan)
set -g status-style 'bg=#333333 fg=#ffffff'

# Format Kiri (Nama Sesi)
set -g status-left "[#S] "
set -g status-left-length 20

# Format Kanan Tanggal Jam Detik: 2026-03-03 17:33:05
set -g status-right "%Y-%m-%d %H:%M:%S "

# Desain Window yang sedang aktif (Biar tidak bingung kursor di mana)
setw -g window-status-current-style 'fg=white bg=blue,bold'
setw -g window-status-current-format ' #I:#W '

# Panel aktif memiliki border yang jelas
set -g pane-active-border-style fg=white,bg=green,bold
set -g pane-border-style fg=colour238

# 4. NAVIGASI HOME/END (COPY MODE)
# ---------------------------------------------
# Gunakan gaya navigasi Vi saat di Copy Mode (Prefix + [)
setw -g mode-keys vi

# Pengaturan warna status kiri
set -g status-left-length 20

# [ (kuning) #S (cokelat) ] (kuning)
# #[fg=color] adalah cara memberikan warna di tengah string
set -g status-left "#[fg=yellow,bold][#[fg=blue]#S#[fg=yellow,bold]] "

# Kita kosongkan style globalnya agar tidak menabrak warna inline di atas
set -g status-left-style ""
